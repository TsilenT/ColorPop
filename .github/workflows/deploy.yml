name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5.0.0

      - name: Install Godot 4.3-stable and export templates
        env:
          GODOT_VERSION: 4.3-stable
        run: |
          curl --fail --location --retry 3 \
            --output godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          sudo install -m 0755 "Godot_v${GODOT_VERSION}_linux.x86_64" /usr/local/bin/godot

          curl --fail --location --retry 3 \
            --output templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          unzip -q templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates/4.3.stable"
          mv templates/* "$HOME/.local/share/godot/export_templates/4.3.stable/"

      - name: Import project resources
        run: godot --headless --path "$GITHUB_WORKSPACE" --import

      - name: Export Web build
        run: |
          mkdir -p build/web
          godot --headless --path "$GITHUB_WORKSPACE" \
            --export-release "Web" "$GITHUB_WORKSPACE/build/web/index.html"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
